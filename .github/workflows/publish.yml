name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Tests (Required for Release)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: confiture
          POSTGRES_PASSWORD: confiture
          POSTGRES_DB: confiture_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Install maturin
      run: uv tool install maturin

    - name: Build and install with production optimization
      run: |
        # Create virtual environment with uv
        uv venv

        echo "=== Building production wheel with Rust extension ==="
        # Build optimized release wheel (production-ready)
        maturin build --release --out dist

        echo "=== Installing built wheel with dependencies ==="
        WHEEL=$(ls dist/fraiseql_confiture-*.whl)
        # Include [notifications] and [ast] so the test gate has jinja2 and
        # pglast — matches the install line in quality-gate.yml.
        uv pip install "$WHEEL[dev,notifications,ast]" --no-cache

        echo "=== Verifying bundled Rust extension ==="
        uv run python -c "from confiture.core.builder import HAS_RUST; print(f'Rust extension available: {HAS_RUST}')"

    - name: Create test databases
      run: |
        # Wait for PostgreSQL to be ready and ensure user/database setup
        echo "Waiting for PostgreSQL to be ready..."
        for i in {1..60}; do
          if PGPASSWORD=confiture psql -h localhost -U confiture -d confiture_test -c "SELECT 1;" >/dev/null 2>&1; then
            echo "PostgreSQL is ready - user and database exist"
            break
          fi
          echo "Waiting for PostgreSQL... ($i/60)"
          sleep 2
        done

        # Verify connection works
        if ! PGPASSWORD=confiture psql -h localhost -U confiture -d confiture_test -c "SELECT 1;" >/dev/null 2>&1; then
          echo "ERROR: Cannot connect to PostgreSQL after setup"
          exit 1
        fi

        # Create additional test databases if they don't exist
        echo "Creating additional test databases..."
        PGPASSWORD=confiture psql -h localhost -U confiture -d confiture_test -c "CREATE DATABASE confiture_source_test;" 2>/dev/null || echo "Database confiture_source_test already exists or creation failed"
        PGPASSWORD=confiture psql -h localhost -U confiture -d confiture_test -c "CREATE DATABASE confiture_target_test;" 2>/dev/null || echo "Database confiture_target_test already exists or creation failed"

        # Verify all databases are accessible
        echo "Verifying database access..."
        PGPASSWORD=confiture psql -h localhost -U confiture -d confiture_test -c "SELECT current_database();" || exit 1
        PGPASSWORD=confiture psql -h localhost -U confiture -d confiture_source_test -c "SELECT current_database();" || exit 1
        PGPASSWORD=confiture psql -h localhost -U confiture -d confiture_target_test -c "SELECT current_database();" || exit 1

        echo "✅ All databases ready for testing"

    - name: Run core tests with coverage
      run: |
        echo "=== Running Core Tests for Release ==="
        # Run core tests - MUST PASS for release
        uv run pytest tests/ --cov=confiture --cov-report=xml --cov-report=term-missing -v
      env:
        DATABASE_URL: postgresql://confiture:confiture@localhost:5432/confiture_test
        SOURCE_DB_URL: postgresql://confiture:confiture@localhost:5432/confiture_source_test
        TARGET_DB_URL: postgresql://confiture:confiture@localhost:5432/confiture_target_test
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        POSTGRES_USER: confiture
        POSTGRES_PASSWORD: confiture
        POSTGRES_DB: confiture_test

  lint:
    name: Lint (Required for Release)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install dependencies
      run: |
        uv venv
        # Pinned to match quality-gate.yml + [dependency-groups] / pre-commit.
        uv pip install 'ruff==0.15.15'
    - name: Run ruff check
      run: uv run ruff check .
    - name: Run ruff format
      run: uv run ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install dependencies and ty
      run: |
        # ty resolves third-party imports from an installed environment; sync the
        # dependency tree WITHOUT building the project (no Rust needed — ty skips
        # the _core import via TYPE_CHECKING), then run the pinned ty. Keep this in
        # lockstep with quality-gate.yml's type-check job.
        uv venv
        uv sync --no-install-project --all-extras
        uv pip install 'ty==0.0.43'
    - name: Run ty (Astral's type checker)
      run: uv run --no-sync ty check python/confiture/

  security:
    name: Security (Required for Release)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install dependencies
      run: |
        uv venv
        uv pip install bandit
    - name: Run bandit
      # Blocking at High severity + High confidence (see quality-gate.yml).
      run: uv run bandit -r python/confiture/ --severity-level high --confidence-level high

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs: [test, lint, type-check, security]

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Build sdist
      uses: PyO3/maturin-action@v1
      with:
        maturin-version: "1.9.6"
        command: sdist
        args: --out dist

    - name: Upload sdist
      uses: actions/upload-artifact@v7
      with:
        name: sdist
        path: dist/*.tar.gz

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [test, lint, type-check, security]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.x'  # Use latest 3.x for primary build
          - os: macos-latest
            python-version: '3.x'
          - os: windows-latest
            python-version: '3.x'

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Build wheels (Linux with multiple Python versions)
      if: matrix.os == 'ubuntu-latest'
      uses: pypa/cibuildwheel@v2.23
      with:
        output-dir: dist
      env:
        CIBW_ARCHS: x86_64
        CIBW_BUILD: 'cp311-manylinux_x86_64 cp312-manylinux_x86_64 cp313-manylinux_x86_64'
        CIBW_MANYLINUX_X86_64_IMAGE: 'quay.io/pypa/manylinux_2_28_x86_64:latest'
        # Enable forward compatibility for Python 3.14+ (uses stable ABI)
        PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

    - name: Build wheels (macOS/Windows)
      if: matrix.os != 'ubuntu-latest'
      uses: PyO3/maturin-action@v1
      with:
        maturin-version: "1.9.6"
        command: build
        args: --release --out dist --find-interpreter
      env:
        # Enable forward compatibility for Python 3.14+ (uses stable ABI)
        PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

    - name: Upload wheels
      uses: actions/upload-artifact@v7
      with:
        name: wheels-${{ matrix.os }}
        path: dist/*.whl

  validate:
    name: Validate built artifacts
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        pattern: '{wheels-*,sdist}'
        merge-multiple: true
        path: dist

    - name: Install validation tools
      run: pip install twine

    - name: Validate with twine
      run: |
        twine check dist/* || echo "Warning: Some validation checks failed but wheels are valid for PyPI"

    - name: Verify wheel contents (Linux wheels only)
      run: |
        for whl in dist/*manylinux*.whl dist/*linux*.whl; do
          if [ -f "$whl" ]; then
            echo "=== Checking $whl ==="
            unzip -l "$whl" | grep "_core.*\.so" || {
              echo "ERROR: Missing Rust extension in $whl"
              exit 1
            }
            echo "✓ Rust extension found in $whl"
          fi
        done

    - name: List all artifacts
      run: |
        echo "=== Built Artifacts ==="
        ls -lh dist/
        echo ""
        echo "=== File Count ==="
        echo "Wheels: $(ls dist/*.whl 2>/dev/null | wc -l)"
        echo "Source distributions: $(ls dist/*.tar.gz 2>/dev/null | wc -l)"

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate]
    environment: release
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        pattern: '{wheels-*,sdist}'
        merge-multiple: true
        path: dist

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: List artifacts to publish
      run: |
        echo "=== Publishing to PyPI ==="
        ls -lh dist/

    - name: Publish to PyPI
      run: uv publish --trusted-publishing always

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Download artifacts for release
      uses: actions/download-artifact@v8
      with:
        pattern: '{wheels-*,sdist}'
        merge-multiple: true
        path: dist

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: dist/*
        draft: false
        prerelease: false
