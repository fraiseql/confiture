name: Quality Gate

# Comprehensive quality checks for all PR and main branch protection
# This is the unified workflow for CI/CD quality assurance
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: confiture
          POSTGRES_PASSWORD: confiture
          POSTGRES_DB: confiture_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Install maturin
      run: uv tool install maturin

    - name: Setup environment and install dependencies
      run: |
        # Create virtual environment with uv
        uv venv

        # Install all dependencies, including the [notifications] and [ast]
        # extras — tests/unit/hooks/notifications/ requires jinja2, and the
        # SQL parsers depend on pglast for the primary path.
        uv pip install ".[dev,notifications,ast]"

        # Build and install Rust extension with modern maturin+uv integration
        uv run maturin develop --uv

    - name: Verify Environment
      run: |
        echo "=== Environment Verification ==="
        uv run python --version
        uv --version
        uv run pytest --version
        rustc --version
        pg_isready -h localhost -p 5432 -U confiture && echo '✅ PostgreSQL Ready' || echo '❌ PostgreSQL Not Ready'
        uv run python -c "import psycopg; conn = psycopg.connect('postgresql://confiture:confiture@localhost:5432/confiture_test'); print('✅ DB connection successful'); conn.close()" || echo "❌ DB connection failed"
        echo "=== Rust Extension Verification ==="
        uv run python -c "from confiture.core.builder import HAS_RUST; print(f'✅ Rust extension loaded: {HAS_RUST}')" || echo "❌ Builder import failed"

    - name: Create test databases
      run: |
        PGPASSWORD=confiture psql -h localhost -U confiture -c "SELECT 1;" confiture_test || PGPASSWORD=confiture psql -h localhost -U confiture -d postgres -c "CREATE DATABASE confiture_test;"
        PGPASSWORD=confiture psql -h localhost -U confiture -c "SELECT 1;" confiture_source_test || PGPASSWORD=confiture psql -h localhost -U confiture -d postgres -c "CREATE DATABASE confiture_source_test;"
        PGPASSWORD=confiture psql -h localhost -U confiture -c "SELECT 1;" confiture_target_test || PGPASSWORD=confiture psql -h localhost -U confiture -d postgres -c "CREATE DATABASE confiture_target_test;"

    - name: Run core tests with coverage
      env:
        DATABASE_URL: postgresql://confiture:confiture@localhost:5432/confiture_test
        SOURCE_DB_URL: postgresql://confiture:confiture@localhost:5432/confiture_source_test
        TARGET_DB_URL: postgresql://confiture:confiture@localhost:5432/confiture_target_test
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        POSTGRES_USER: confiture
        POSTGRES_PASSWORD: confiture
        POSTGRES_DB: confiture_test
      run: |
        echo "=== Running Core Tests ==="
        uv run pytest tests/ \
          --cov=confiture \
          --cov-report=xml \
          --cov-report=term-missing \
          -v \
          --tb=short \
          || {
            echo "❌ Core tests failed with exit code $?"
            exit 1
          }
        echo "✅ Core tests completed successfully"

    - name: Upload coverage
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        flags: unittests
        name: Python-3.11
        fail_ci_if_error: false
      continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install dependencies
      run: |
        uv venv
        # Pinned: ruff's lint/format rules evolve between releases (e.g. UP042,
        # formatter style), so an unpinned install can turn CI red on an
        # unrelated PR. Keep in lockstep with [dependency-groups] ruff and
        # .pre-commit-config.yaml's rev, deliberately.
        uv pip install 'ruff==0.15.15'
    - name: Run ruff check
      run: uv run ruff check .
    - name: Run ruff format check
      run: uv run ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Cache ty tool
      uses: actions/cache@v5
      with:
        path: ~/.cache/uv
        key: uv-cache-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          uv-cache-${{ runner.os }}-
    - name: Install dependencies and ty
      run: |
        # ty resolves third-party imports from an installed environment; without
        # the deps present its `unresolved-import` rule (a pre-1.0 default) fires
        # on every `import psycopg`/`pydantic`/... . Sync the dependency tree
        # WITHOUT building the project (--no-install-project), so no Rust toolchain
        # is needed here — ty skips the `_core` import via TYPE_CHECKING.
        uv venv
        uv sync --no-install-project --all-extras
        # Pinned: ty is pre-1.0 and adds default rules frequently, so an unpinned
        # install can turn CI red on an unrelated PR. Keep in lockstep with the ty
        # pre-commit hook / dev extra, deliberately.
        uv pip install 'ty==0.0.43'
    - name: Run ty type check on Python code
      # --no-sync: don't let `uv run` rebuild the project (which needs Rust).
      run: uv run --no-sync ty check python/confiture/
      timeout-minutes: 5

  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Run cargo fmt check
      run: cargo fmt --check

    - name: Run cargo clippy
      run: cargo clippy -- -D warnings

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install dependencies
      run: |
        uv venv
        uv pip install bandit
    - name: Run bandit security scan
      # Blocking at High severity + High confidence. Lower-severity B608
      # findings (SQL built from validated/quoted identifiers — see the
      # `# noqa: S608` sites) are tracked separately; the one High finding
      # (subprocess shell=True on trusted-operator config) carries a
      # justified `# nosec B602`.
      run: uv run bandit -r python/confiture/ --severity-level high --confidence-level high
    # Trivy scans dependencies for CVEs, which surface over time independent of
    # the PR — kept advisory (continue-on-error) so a newly-disclosed CVE can't
    # block an unrelated change. Bandit is the blocking security leg.
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        severity: 'CRITICAL,HIGH'
      continue-on-error: true

  # Quality gate summary job - this job fails if any quality check fails
  quality-gate:
    name: Quality Gate ✅
    runs-on: ubuntu-latest
    needs: [test, lint, type-check, rust-checks, security]
    if: always()
    steps:
      - name: Check quality gate status
        run: |
          # This job will fail if any of the required jobs failed
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Tests failed - Quality gate blocked"
            exit 1
          fi
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ Lint checks failed - Quality gate blocked"
            exit 1
          fi
          if [[ "${{ needs.type-check.result }}" != "success" ]]; then
            echo "❌ Type check failed - Quality gate blocked"
            exit 1
          fi
          if [[ "${{ needs.rust-checks.result }}" != "success" ]]; then
            echo "❌ Rust checks failed - Quality gate blocked"
            exit 1
          fi
          if [[ "${{ needs.security.result }}" != "success" ]]; then
            echo "❌ Security checks failed - Quality gate blocked"
            exit 1
          fi
          echo "✅ All quality checks passed - Quality gate open"
          echo "🚀 Code is ready for merge/release"
